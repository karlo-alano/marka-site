name: continuous-integration-main.yml

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  shared-changes:
    runs-on: ubuntu-latest

    outputs:
      backend: ${{ steps.filter.outputs.backend}}
      frontend: ${{ steps.filter.outputs.frontend}}

    steps:
      - uses: actions/checkout@v4

      - name: Detect changed filese
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'Backend/**'
            frontend:
              - 'Frontend/**'

  shared-gitleaks:
    needs: shared-changes

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  shared-trivy:
    runs-on: ubuntu-latest
    needs: shared-changes

    steps:
      - uses: actions/checkout@v4

      - name: Run trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1

  backend-lint-format:
    needs: shared-changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff
      - name: Run linter
        run: |
          ruff check . --config pyproject.toml
      - name: Run format
        run: |
          ruff format --check . --config pyproject.toml
          git diff --exit-code

  backend-pytest:
    runs-on: ubuntu-latest
    needs: [shared-trivy, backend-lint-format]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run tests
        run: python -m pytest

  frontend-eslint:
    needs: shared-changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install modules
        run: npm ci

      - name: Run linter program
        run: npm run lint

  frontend-prettier:
    needs: frontend-eslint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install modules
        run: npm ci

      - name: Run formatting program
        run: npm run format:check

  frontend-vitest:
    needs: [shared-trivy, frontend-eslint, frontend-prettier]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install modules
        run: npm ci

      - name: Run formatting program
        run: npm run test
